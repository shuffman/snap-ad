<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarAd Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body class="workspace-page">

  <header class="workspace-header">
    <a href="/" class="workspace-logo">CarAd Pro</a>
    <div class="workspace-header-actions">
      <a href="/" class="header-btn">
        <i class="bi bi-plus-lg"></i> New Listing
      </a>
    </div>
  </header>

  {% if drive_error %}
  <div class="drive-error-bar">
    <i class="bi bi-exclamation-triangle-fill"></i> {{ drive_error }}
  </div>
  {% endif %}

  <div class="workspace">

    <!-- ── Photo panel ── -->
    <div class="photo-panel">
      <div class="gallery-area">
        {% if image_count > 0 %}
          <img id="galleryHero"
               src="/image/{{ result_id }}/0"
               alt="Photo 1"
               class="gallery-hero-img">
        {% else %}
          <div class="no-photos">No photos</div>
        {% endif %}
      </div>

      {% if image_count > 1 %}
      <div class="thumb-strip">
        {% for i in range(image_count) %}
          <button class="thumb-btn {% if i == 0 %}active{% endif %}"
                  data-index="{{ i }}"
                  onclick="showPhoto(this, {{ i }})">
            <img src="/image/{{ result_id }}/{{ i }}" alt="">
          </button>
        {% endfor %}
      </div>
      {% endif %}

      <div class="photo-toolbar">
        <span class="toolbar-label">Enhance</span>
        <div class="preset-group">
          <button class="preset-btn {% if enhance_preset == 'natural' %}active{% endif %}"
                  data-preset="natural">Natural</button>
          <button class="preset-btn {% if enhance_preset == 'standard' %}active{% endif %}"
                  data-preset="standard">Standard</button>
          <button class="preset-btn {% if enhance_preset == 'vivid' %}active{% endif %}"
                  data-preset="vivid">Vivid</button>
          <button class="preset-btn {% if enhance_preset == 'bold' %}active{% endif %}"
                  data-preset="bold">Bold</button>
        </div>
        <a id="downloadBtn"
           href="/download/{{ result_id }}/0"
           class="icon-btn ms-auto"
           download
           title="Download current photo">
          <i class="bi bi-download"></i>
        </a>
      </div>
    </div>

    <!-- ── Content panel ── -->
    <div class="content-panel">

      <div class="content-toolbar">
        <button id="regenerateBtn" class="toolbar-btn">
          <i class="bi bi-arrow-clockwise"></i> Regenerate
        </button>
        <button id="copyBtn" class="toolbar-btn">
          <i class="bi bi-clipboard"></i> Copy
        </button>
        <div class="toolbar-spacer"></div>
        <button id="downloadZipBtn" class="toolbar-btn">
          <i class="bi bi-file-zip"></i> Download
        </button>
        <button id="publishBtn" class="toolbar-btn primary">
          <i class="bi bi-github"></i> Publish to forsale
        </button>
      </div>

      <div id="listingEditor"
           class="listing-editor"
           contenteditable="true"
           spellcheck="true"></div>

      <div id="publishStatus" class="publish-status hidden"></div>

      <div class="refine-bar">
        <input id="refineInput" type="text"
               placeholder="Correct or add info — e.g. 'Mileage is 45k, it has a sunroof, asking $28,500'">
        <button id="refineBtn">
          <i class="bi bi-pencil-square"></i> Apply
        </button>
      </div>

    </div>
  </div>

  <script>
    const RESULT_ID = "{{ result_id }}";
    const IMAGE_COUNT = {{ image_count }};
    const RAW_LISTING = {{ listing_text | tojson }};
    const ENHANCE_PRESET = "{{ enhance_preset }}";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
