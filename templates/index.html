<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarAd Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body class="upload-page">

  <div class="upload-screen">
    <div class="upload-logo">CarAd Pro</div>

    <h1 class="upload-headline">What are you selling?</h1>
    <p class="upload-sub">Drop photos or documents — we'll write the listing.</p>

    {% if error == 'no_files' %}
    <div class="upload-error">Please add at least one photo or document before continuing.</div>
    {% endif %}

    <form id="uploadForm" action="/process" method="post" enctype="multipart/form-data">

      <div id="dropZone" class="drop-zone-lg">
        <input type="file" id="fileInput" name="images" multiple accept="image/*,.pdf" class="d-none">

        <div id="dropPrompt">
          <i class="bi bi-cloud-arrow-up"></i>
          <p>Drop files here or <span class="browse-link">browse</span></p>
          <p class="drop-hint">Photos &middot; PDFs (Carfax, build sheet, window sticker)</p>
        </div>

        <div id="previewGrid" class="preview-grid-lg hidden"></div>
      </div>

      <div id="fileCountRow" class="file-count-row hidden">
        <span id="fileCountLabel"></span>
        <button type="button" id="clearBtn">Clear all</button>
      </div>

      <div class="drive-row">
        <i class="bi bi-google"></i>
        <input type="url" name="gdrive_url" id="gdriveUrl"
               placeholder="Or paste a Google Drive folder link…">
      </div>

      <textarea name="extra_info" class="extra-info-box"
                placeholder="Anything else to include — price, location, history, key features, condition notes…"
                rows="3"></textarea>

      <button type="submit" class="btn-create" id="submitBtn">
        Create Listing <i class="bi bi-arrow-right"></i>
      </button>

    </form>
  </div>

  <!-- Processing overlay -->
  <div id="processingOverlay" class="processing-overlay hidden">
    <div class="processing-card">
      <div class="processing-spinner"></div>
      <div class="processing-label" id="processingLabel">Processing your files…</div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
